name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.os }} · py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Install xvfb (Linux, so the Tk widget render test runs headless)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - name: Run tests (Linux, under a virtual X display)
        if: runner.os == 'Linux'
        run: xvfb-run -a pytest -q
      - name: Run tests
        if: runner.os != 'Linux'
        run: pytest -q

  # End-to-end installer check: the unit suite above mocks the OS calls, so this
  # job runs the real install/uninstall and asserts the actual launcher artifacts
  # appear and are removed. Autostart uses --no-launch so no GUI widget is spawned
  # on a headless runner.
  installer-smoke:
    name: installer-smoke · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: "Smoke: macOS .app launcher + LaunchAgent plist"
        if: runner.os == 'macOS'
        run: |
          set -eux
          vibesignal install-launcher
          test -d "$HOME/Applications/VibeSignal.app"
          vibesignal install-autostart --no-launch
          test -f "$HOME/Library/LaunchAgents/io.github.yzhao062.vibesignal.plist"
          vibesignal uninstall-autostart
          test ! -f "$HOME/Library/LaunchAgents/io.github.yzhao062.vibesignal.plist"
          vibesignal uninstall-launcher
          test ! -d "$HOME/Applications/VibeSignal.app"

      - name: "Smoke: Windows .lnk shortcuts (Start menu, Desktop, Startup)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $programs = [Environment]::GetFolderPath('Programs')
          $desktop  = [Environment]::GetFolderPath('Desktop')
          $startup  = [Environment]::GetFolderPath('Startup')
          vibesignal install-launcher
          if (-not (Test-Path (Join-Path $programs 'VibeSignal.lnk'))) { throw 'missing Start menu .lnk' }
          if (-not (Test-Path (Join-Path $desktop  'VibeSignal.lnk'))) { throw 'missing Desktop .lnk' }
          vibesignal install-autostart --no-launch
          if (-not (Test-Path (Join-Path $startup 'VibeSignal.lnk'))) { throw 'missing Startup .lnk' }
          vibesignal uninstall-autostart
          if (Test-Path (Join-Path $startup 'VibeSignal.lnk')) { throw 'Startup .lnk not removed' }
          vibesignal uninstall-launcher
          if (Test-Path (Join-Path $programs 'VibeSignal.lnk')) { throw 'Start menu .lnk not removed' }
          if (Test-Path (Join-Path $desktop  'VibeSignal.lnk')) { throw 'Desktop .lnk not removed' }

      - name: "Smoke: Linux installer refuses cleanly"
        if: runner.os == 'Linux'
        run: |
          set -eux
          command -v vibesignal   # fail loudly if the console script is missing (else a not-found would look like a refusal)
          if vibesignal install-launcher 2>launcher.err; then echo "ERROR: install-launcher should refuse on Linux"; exit 1; fi
          grep -F "current platform is 'linux'" launcher.err
          if vibesignal install-autostart 2>autostart.err; then echo "ERROR: install-autostart should refuse on Linux"; exit 1; fi
          grep -F "current platform is 'linux'" autostart.err
          echo "installer refused on Linux as expected"
